// Distance patching
@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[0.1]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 0.1
        }
        @Properties
        {
            @sphereOfInfluence *= 0.5
        }
    }
}

@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[0.5]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 0.5
        }
    }
}

@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[10]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 10
        }
    }
}

@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[100]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 100
        }
    }
}

// General homeswitch setup
@Kopernicus:HAS[@KSFSettings:HAS[#homeSwitch[Mirage]]]:AFTER[KSF]
{
    removeLaunchSites = Desert_Launch_Site,Desert_Airfield,Desert_GroundObjects,Woomerang_Launch_Site,Woomerang_GroundObjects,Island_Airfield 
    @Body[Kerbin]
    {
        @PQS
        {
            !Mods[MapDecalTangent,KSC] {}
            !MapDecalVertexRemoveScatter:HAS[#name[ParallaxMaskKSC]] {}
        }
        !SpaceCenter {}
    }
}



// Undoes homeswitch
@Kopernicus_config:HAS[@KSFSettings:HAS[#homeSwitch[?alse]]]:BEFORE[KSF]
{
    %HomeWorldName = Kerbin
    %KSCLightsAlwaysOn = False
    %useManualMemoryManagement = False
}

// Homeswitch definitions
SYS_DUMMY
{
    name = KSFmain
}
@SYS_DUMMY:FOR[KSFmain]
{
    %status = Installed
}

// Mirage homeswitch
@SYS_DUMMY:HAS[#name[KSFmain],@KSFSettings:HAS[#homeSwitch[Mirage]]]:BEFORE[KSF]
{
    name = MirageHomeswitch
}
@SYS_DUMMY:FOR[MirageHomeswitch]
{
    %status = Installed
}