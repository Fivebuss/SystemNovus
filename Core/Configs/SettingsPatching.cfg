// Distance patching
@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[0.1]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 0.1
        }
        @Properties
        {
            @sphereOfInfluence *= 0.5
        }
    }
}

@Kopernicus:AFTER[Kopernicus]:HAS[@KSFSettings:HAS[#distanceMultiplier[0.5]]]
{
    @Body[Novus]:NEEDS[SystemNovus]
    {
        @Orbit
        {
            @semiMajorAxis *= 0.5
        }
    }
}

