// Places mirage homeswitch
// 11.9249135987105lat, -49.4699637991059long

// Using my KSS2 homeswitch template

// Fixes some odd issues
@Kopernicus_config:HAS[@KSFSettings:HAS[#homeSwitch[Mirage]]]:AFTER[KOPERNICUS]:NEEDS[SystemNovus]
{
    %useManualMemoryManagement = True
}

// The actual homeswitch part


//Must run early so seperate node
@Kopernicus_config:HAS[@KSFSettings:HAS[#homeSwitch[Mirage]]]:BEFORE[SystemNovus]
{
    %HomeWorldName = Mirage
}

@Kopernicus:HAS[@KSFSettings:HAS[#homeSwitch[Mirage]]]:AFTER[KSF]:NEEDS[SystemNovus]
{
    @Body[Mirage]
    {
        %cacheFile = KSF/Cache/MirageHS.bin
        @Debug
        {
            exportMesh = True
        }
        @Properties
        {
            isHomeWorld = True
        }
        // PostSpawnOrbit // I despise PSO
        // {
        //     referenceBody = #$../../Body[Mirage]/Orbit/refrenceBody$
        // }
        @ScaledVersion
        {
            // We disable OD to help stop some issues
            @Material
            {
                texture = KSF/Systems/SystemNovus/PluginData/Mirage_Color.dds
                normals = KSF/Systems/SystemNovus/PluginData/Mirage_Normal.dds
            }
            !OnDemand {}
        }
        // PQS nonsense such as flattening the ground
        @PQS
        {
            @Mods
            {
                MapDecalTangent
                {
                    absolute = True
                    absoluteOffset = 4550
                    angle = 120
                    cullBlack = False
                    DEBUG_HighlightInclusion = False
                    heightMap = BUILTIN/ksc_decal_heightMap
                    heightMapDeformity = 18
                    removeScatter = False
                    radius = 3150
                    position = 0.63582240, 0.20662965, -0.74366260

                    useAlphaHeightSmoothing = True
                    enabled = True
                    order = 450
                    name = MirageMDT
                }
                // Parallax mask
                !MapDecalVertexRemoveScatter:HAS[#name[ParallaxMaskKSC]] {}
                MapDecalVertexRemoveScatter
                {
                    name = ParallaxMaskKSC
                    colorMap = KSF/Core/Parallax/KSCD.dds
                    debugColorMap = KSF/Core/Parallax/KSCD.dds
                    angle = 40.2
                    radius = 1650
                    position = 0.63582240, 0.20662965, -0.74366260
                    
                    BlockedScatters
                    {
                        name = SlabsSmall
                        name = SlabsMed
                        name = SlabsLarge
                        //name = SmallRocksVar1
                        //name = SmallRocksVar2
                        name = MedRocksVar1
                        name = MedRocksVar2
                        name = MedRocksVar3
                        name = SteepRocksMed
                        name = SteepRocksSmall
                    }

                    debugShowDecal = False
                    order = 99999
                }
            }
        }

        SpaceCenter
        {
            latitude = 11.9249135987105
            longitude = -49.4699637991059
            decalLatitude = 11.9249135987105
            decalLongitude = -49.4699637991059
            repositionRadiusOffset = 4494 //4550
            //radius = 6000
            //heightMapDeformity = 70
            absoluteOffset = 4450
            //absolute = True
            reorientFinalAngle = -40.8 //139.2 // Hopefully 90deg
            lodvisibleRangeMult = 6

            Material
            {
                grassColor = RGBA(131, 89, 55, 1) //#835937
            }
        }
    }
}