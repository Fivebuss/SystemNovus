    en-us
    {

        #LOC_NOVUS_Stars_Novus_displayName = Novus^N
        #LOC_NOVUS_Stars_Novus_description = Novus is a newly-formed blueish white star that is the result from the collision of two smaller ones. As a result, its habitable zone was pushed outwards, cooking paradise planets and thawing ice worlds.

        #LOC_NOVUS_Planets_Helia_displayName = Helia^N
        #LOC_NOVUS_Planets_Helia_description = Helia is the obliterated remnant of a Hycean world. Following Novus's merge, its thick atmosphere was blown mostly away, and its oceans have slowly evaporated downwards. As a result, a flat, barren ocean floor of a landscape remains, and a relatively thinner atmosphere full of humidity and near-planetwide gentle rain. If not for the lack of oxygen and extreme wind speeds found in its rare storms, Helia would be the perfect place to settle.

        #LOC_NOVUS_Planets_Cairn_displayName = Cairn^N
        #LOC_NOVUS_Planets_Cairn_description = Cairn is the lone, rocky, barren moon of Khion. Aside from its striking gray-blue color there are unusually eroded valleys and mountains that point to a tropical paradise, and yet a single glance shows otherwise. But its bleakness is made up by its utility, since it can be used by expert pilots for a nearly free capture!
        
        #LOC_NOVUS_Planets_Ardor_displayName = Ardor^N
        #LOC_NOVUS_Planets_Ardor_description = Ardor is a gas giant that strayed far too close to Novus when it merged. A ripped apart, burning atmosphere with a shattered moon system, and pretty Aurorae from Novus. Its incredibly hot, and prime for scientific discovery, as it may have shielded a moon from the initial merge of Novus...
        
        #LOC_NOVUS_Planets_Adaris_displayName = Adaris^N
        #LOC_NOVUS_Planets_Adaris_description = Adaris is the only surviving moon of Ardor, though surviving isn't quite the correct word. Its been charred beyond recognition by Novus and is tidally stressed by Ardor every second. A hellish volcanic world remains, full of lava, fire, and brimstone with pretty sights of Ardor.
        
        #LOC_NOVUS_Planets_Mirage_displayName = Mirage^N
        #LOC_NOVUS_Planets_Mirage_description = Mirage is a previously habitable paradise that got cooked to oblivion by Novus. Its a hot desert world now, with an unstable climate and atmosphere. Although a brave kerbal may even be able to breath it's trace oxygen, he would probably need SPF2000 sunscreen. It's Duna away from home, with a thick enough atmosphere to fly around in. But the similiarities don't end there, because like Duna, Mirage posseses no magnetosphere, leaving poor kerbals unprotected from Novus.
        
        #LOC_NOVUS_Planets_Khion_displayName = Khion^N
        #LOC_NOVUS_Planets_Khion_description = Khion is a lonely ice giant that is slowly heating up, residing on the edge of the Novus system. It's deep icy blue colors contrast white bands of clouds warming under Novus's heat. Khion's moon system is of particular interest, due in part to its high inclination and perfect distance from Novus for ice-worlds to persist.
        
        #LOC_NOVUS_Planets_Boreas_displayName = Boreas^N
        #LOC_NOVUS_Planets_Boreas_description = Boreas is a cold, icy, barren blue rock that is slowly melting under Novus. Cold tundras, expanses of ice flats and half-frozen water. Boreas posseses unusually thick polar clouds and even snowfall, due to the low gravity and lakes. Although frigid, it is quite bearable, nearly as cold as Kerbin in the winter. Referred as the "Warm Vall" of the Novus System.
        
        #LOC_NOVUS_Planets_Nimis_displayName = Nimis^N
        #LOC_NOVUS_Planets_Nimis_description = Nimis is a small, rocky comet with an icy core that is melting under Novus, forming a beautiful tail seen across the system. However, it's eccentric orbit makes it take over 212 years to make a single revolution around Novus, making missions exceptionally difficult.
        
        // Unused     V    
        #LOC_NOVUS_Planets_Parvus_displayName = Parvus^N
        #LOC_NOVUS_Planets_Parvus_description = Parvus is nicknamed the "gilly of Novus", for both the tiny size and how it quite literally looks like a potato. Thanks to the tidal forces from Khion, Parvus has been stretched to an oval, and if it was any smaller there wouldnt be any moon at all. However, its extremely rich in valuable materials, providing the perfect refueling point assuming you can even land.
        
        // Wormholes

        #LOC_NOVUS_Wormholes_WHNSA_displayName = WH-NS-A
        #LOC_NOVUS_Wormholes_WHNSA_description = First thought to be a cheap mirror installed to the telescopes, a few probes sent provided evidence for an anomalous object around Moho, seen only when it occludes the Sun. What could it be? <color=#DB9EDB> Wormhole links to Khion in the Novus system </color>
        
        #LOC_NOVUS_Wormholes_WHNSB_displayName = WH-NS-B
        #LOC_NOVUS_Wormholes_WHNSB_description = A spacetime anomaly that you can somehow traverse through to and from the Novus system and back home. There isn't a black hole though, poor Dr. Kermann, his life is in shambles. <color=#DB9EDB> Wormhole links to Moho back home </color>
       
       
