@ParallaxTerrain:FOR[SystemPDS]:NEEDS[ParallaxContinued]
{
    @Body[Cinis]
    {
        ParallaxScaledProperties
        {
            minTerrainAltitude = -2200
            maxTerrainAltitude = 15345.28
            usingStockMesh:NEEDS[Scatterer] = True
            mode = FromTerrain

            Material
            {
                _ColorMap = KSF/Systems/SystemPDS/PluginData/Cinis_Color1.dds
                _BumpMap  = KSF/Systems/SystemPDS/PluginData/Cinis_Normal.dds
                _HeightMap = KSF/Systems/SystemPDS/PluginData/Cinis_Height.dds
                _PlanetBumpScale = 0.4

                // Keyword params
                _OceanSpecularPower = 0.02
                _OceanSpecularIntensity = 0.15
                _AtmosphereThickness = 2.0
                _OceanAltitude = 0

                Keywords
                {
                    name = OCEAN_FROM_COLORMAP
                    name:NEEDS[!Scatterer] = ATMOSPHERE
                }
            }

            TerrainMaterialOverride
            {
                // Cursed

                _DisplacementScale = 0.2
                _SpecularPower = 7
                _SpecularIntensity = 0.25
                
                _SteepPower = 30
                _SteepContrast = 1
                _SteepMidpoint = 0.7

                _EnvironmentMapFactor = 0
                _RefractionIntensity = 0

                _Tiling = 0.0006
                _BumpScale = 0.2
                _PlanetBumpScale = 0.6

                // Hope

                _LowMidBlendStart = 1200
                _LowMidBlendEnd = 1600
                _MidHighBlendStart = 3800
                _MidHighBlendEnd = 7500

                _EmissionColor = 0.240, 0.059, 0.011, 1.000
                
            }
        }
    }
}