@ParallaxTerrain:FOR[SystemNovus]:NEEDS[ParallaxContinued]
{
    @Body[Helia]
    {
        ParallaxScaledProperties
        {
            minTerrainAltitude = -6700.21
            maxTerrainAltitude = 3766.15
            usingStockMesh:NEEDS[Scatterer] = True
            mode = FromTerrain

            Material
            {
                _ColorMap = SystemNovus/PluginData/Helia_Color_Scaled.dds
                _BumpMap  = SystemNovus/PluginData/Helia_Normal.dds
                _HeightMap = SystemNovus/PluginData/Helia_Height_Scaled.dds
                _PlanetBumpScale = 0.81

                // Keyword params
                _OceanSpecularPower = 0.5
                _OceanSpecularIntensity = 0.35
                _AtmosphereThickness = 2.0
                _OceanAltitude = 0

                Keywords
                {
                    name = OCEAN_FROM_COLORMAP
                    name:NEEDS[!Scatterer] = ATMOSPHERE
                }
            }

            TerrainMaterialOverride
            {
                _SteepPower = 55
                _Tiling = 0.001
            }
        }
    }
}