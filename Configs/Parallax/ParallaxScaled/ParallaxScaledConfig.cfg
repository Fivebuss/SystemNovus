@ParallaxTerrain:FOR[SystemNovus]:NEEDS[ParallaxContinued]
{
    @Body[Helia]
    {
        ParallaxScaledProperties
        {
            minTerrainAltitude = -7257.54
            maxTerrainAltitude = 2639.43
            usingStockMesh:NEEDS[Scatterer] = True
            mode = FromTerrain

            Material
            {
                _ColorMap = SystemNovus/PluginData/Helia_Color1.dds
                _BumpMap  = SystemNovus/PluginData/Helia_Normal.dds
                _HeightMap = SystemNovus/PluginData/Helia_Height.dds
                _PlanetBumpScale = 0.4

                // Keyword params
                _OceanSpecularPower = 0.02
                _OceanSpecularIntensity = 0.15
                _AtmosphereThickness = 2.0
                _OceanAltitude = 0

                Keywords
                {
                    name = OCEAN_FROM_COLORMAP
                    name:NEEDS[!Scatterer] = ATMOSPHERE
                }
            }

            TerrainMaterialOverride
            {
                // Cursed

                _DisplacementScale = 0.2
                _SpecularPower = 7
                _SpecularIntensity = 0.25
                
                _SteepPower = 400
                _SteepContrast = 1.5
                _SteepMidpoint = 0.7

                _EnvironmentMapFactor = 0 // Fixed fuckass reflections
                _RefractionIntensity = 0

                _Tiling = 0.001

                _PlanetBumpScale = 0.4
                
            }
        }
    }

    @Body[Novera]
    {
        ParallaxScaledProperties
        {
            minTerrainAltitude = -710.04
            maxTerrainAltitude = 9799.90
            usingStockMesh:NEEDS[Scatterer] = True
            mode = FromTerrain

            Material
            {
                _ColorMap = SystemNovus/PluginData/Novera_Color1.dds
                _BumpMap  = SystemNovus/PluginData/Novera_Normal.dds
                _HeightMap = SystemNovus/PluginData/Novera_Height.dds
                _PlanetBumpScale = 0.4

                // Keyword params
                _OceanSpecularPower = 0.02
                _OceanSpecularIntensity = 0.15
                _AtmosphereThickness = 2.0
                _OceanAltitude = 0

                Keywords
                {
                    name = OCEAN_FROM_COLORMAP
                    name:NEEDS[!Scatterer] = ATMOSPHERE
                }
            }

            TerrainMaterialOverride
            {
                // Cursed

                _DisplacementScale = 0.2
                _SpecularPower = 7
                _SpecularIntensity = 0.25
                
                _SteepPower = 30
                _SteepContrast = 1
                _SteepMidpoint = 0.7

                _EnvironmentMapFactor = 0
                _RefractionIntensity = 0

                _Tiling = 0.00011
                _BumpScale = 0.2 // Wait what? These are different?
                _PlanetBumpScale = 0.6
                
            }
        }
    }
}