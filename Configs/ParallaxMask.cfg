// yeah I dont need PQScity/2 having parallax scatters in them
// I will just copy how my homeswitch config does it
@Kopernicus:FOR[SystemNovus]
{
    @Body[Mirage]
    {
        @PQS
        {
            @Mods
            {
                MapDecalVertexRemoveScatter
                {
                    name = ParallaxMaskMirageAnomaly
                    colorMap = SystemNovus/Configs/Parallax/CircleMask.dds
                    debugColorMap = SystemNovus/Configs/Parallax/CircleMask.dds
                    angle = 0
                    radius = 200 //650
                    position = -0.04529241, -0.94732465, -0.31705615 // latitude = -71.3204499565036 longitude = -98.1298671987419
                    
                    BlockedScatters
                    {
                        name = SlabsSmall
                        name = SlabsMed
                        name = SlabsLarge
                        //name = SmallRocksVar1
                        //name = SmallRocksVar2
                        name = MedRocksVar1
                        name = MedRocksVar2
                        name = MedRocksVar3
                        name = SteepRocksMed
                        name = SteepRocksSmall
                    }

                    debugShowDecal = False
                    order = 99999
                }
                
            }
        }
    }
}