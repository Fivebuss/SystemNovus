        #LOC_NOVUS_Stars_Novus_displayName = Novus^N
        #LOC_NOVUS_Stars_Novus_description = Novus is a newly-formed blueish white star that is the result from the collision of two smaller ones. As a result, its habitable zone was pushed outwards, cooking paradise planets and thawing ice worlds.

        #LOC_NOVUS_Planets_Helia_displayName = Helia^N
        #LOC_NOVUS_Planets_Helia_description = Helia is the obliterated remnant of a Hycaen world. Following Novus's merge, it's thick atmosphere was blown mostly away, and its oceans have slowly evaporated downwards. As a result, a flat, barren ocean floor of a landscape remains, though some basic life may have survived somewhere, such as large craters or lakes. Be warned of the high-oxygen water however, it is most likely toxic to any brave kerbals who land venture to this rock. One will also want to avoid the anomalous weather, as Novus is not so kind to this world.

        #LOC_NOVUS_Planets_Ardor_displayName = Ardor^N
        #LOC_NOVUS_Planets_Ardor_description = Ardor is a gas giant that strayed far too close to Novus when it merged. A ripped apart, burning atmosphere with a shattered moon system, and pretty Aurorae from Novus. Its incredibly hot, and a prime place for scientific discovery, as it may have shielded a moon from the initial merge of Novus...
        
        #LOC_NOVUS_Planets_Adaris_displayName = Adaris^N
        #LOC_NOVUS_Planets_Adaris_description = Adaris is the only surviving moon of Ardor, though surviving isn't quite the correct word. Its been charred beyond recognition by Novus and is bombarded constantly by Ardor's disk. A hellish volcanic world remains, where the hit movie "Revenge of the Kerth" was filmed!
        
        #LOC_NOVUS_Planets_Novera_displayName = Novera^N
        #LOC_NOVUS_Planets_Novera_description = Novera is a beautiful, humid, tropical world with very shallow oceans and many islands and atolls. Its the result of an Iceball that rapidly melted, turning its ice to water and oxygen lakes into a breathable atmosphere. Unlike to the inner planets, Novus is far kinder, providing beautiful Aurorae and very little danger. 

        #LOC_NOVUS_Planets_Mirage_displayName = Mirage^N
        #LOC_NOVUS_Planets_Mirage_description = Mirage is a previously habitable paradise that got cooked to oblivion by Novus. Its a hot desert world now, with an unstable climate and atmosphere. Although a brave kerbal may even be able to breath it's trace oxygen, he would probably need SPF2000 sunscreen. Though the poles may be more survivable. It's Duna away from home, with a thick enough atmosphere to fly around in.
